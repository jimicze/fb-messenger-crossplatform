<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messenger X</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #f0f2f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #65676b;
    }
    .container {
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0084ff 0%, #9b59b6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      position: relative;
    }
    /* Chat-bubble icon inside the gradient circle */
    .logo::after {
      content: '';
      width: 32px;
      height: 32px;
      background: white;
      border-radius: 50%;
      clip-path: polygon(
        0% 0%, 100% 0%, 100% 75%,
        60% 75%, 40% 100%, 40% 75%,
        0% 75%
      );
    }
    .title {
      font-size: 20px;
      font-weight: 600;
      color: #050505;
      margin-bottom: 12px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #d8dadf;
      border-top-color: #0084ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"></div>
    <div class="title">Messenger X</div>
    <div class="spinner"></div>
  </div>
</body>
</html>
