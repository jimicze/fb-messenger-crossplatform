name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Two-phase release:
#   1. create-release  — creates a single GitHub Release (eliminates race)
#   2. build-tauri     — 6 parallel matrix jobs upload artifacts to that release
#
# Matrix produces artifacts for:
#   macOS      — arm64 (.dmg) + x86_64 (.dmg)
#   Windows    — x64 (.exe/.msi) + arm64 (.exe/.msi)
#   Linux x64  — .deb + .rpm + .AppImage
#   Linux arm64— .deb + .rpm + .AppImage
#
# Distro coverage:
#   Debian / Ubuntu / Linux Mint → .deb
#   Fedora / RHEL / openSUSE     → .rpm
#   Arch / NixOS / any distro    → .AppImage (universal)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 1: Create a single GitHub Release before any builds start.
  # This eliminates the race condition where parallel matrix jobs each tried
  # to create their own draft release (causing lost artifacts in v0.2.1).
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-id: ${{ steps.create.outputs.id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Messenger X ${{ github.ref_name }}'
          body: |
            ## Downloads

            | Platform | Architecture | Installer |
            |----------|-------------|-----------|
            | **Windows** | x64 | `.exe` (NSIS) or `.msi` |
            | **Windows** | ARM64 | `.exe` (NSIS) or `.msi` |
            | **macOS** | Apple Silicon | `.dmg` |
            | **macOS** | Intel | `.dmg` |
            | **Linux** | x64 | `.deb` / `.rpm` / `.AppImage` |
            | **Linux** | ARM64 | `.deb` / `.rpm` / `.AppImage` |

            ### Linux distro guide
            - **Debian / Ubuntu / Linux Mint** → `.deb`
            - **Fedora / RHEL / openSUSE** → `.rpm`
            - **Arch Linux / any other** → `.AppImage`
          draft: false
          prerelease: false

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 2: Build on all platforms and upload artifacts to the release.
  # Each job receives the releaseId so no job tries to create its own release.
  # For workflow_dispatch (no tag), jobs only build without uploading.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-tauri:
    needs: create-release
    if: always()
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
            label: 'macOS-arm64'

          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
            label: 'macOS-x64'

          # ── Windows ────────────────────────────────────────────────────────
          - platform: 'windows-latest'
            args: ''
            rust-targets: ''
            label: 'Windows-x64'

          - platform: 'windows-latest'
            args: '--target aarch64-pc-windows-msvc'
            rust-targets: 'aarch64-pc-windows-msvc'
            label: 'Windows-arm64'

          # ── Linux x64 ─────────────────────────────────────────────────────
          - platform: 'ubuntu-22.04'
            args: ''
            rust-targets: ''
            label: 'Linux-x64'

          # ── Linux arm64 ────────────────────────────────────────────────────
          - platform: 'ubuntu-22.04-arm'
            args: ''
            rust-targets: ''
            label: 'Linux-arm64'

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── Linux system dependencies ────────────────────────────────────────
      - name: Install Linux system dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libssl-dev \
            libdbus-1-dev \
            xdg-utils

      # ── Node.js ──────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # ── Rust toolchain ───────────────────────────────────────────────────
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.label }}

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── Build & Upload ───────────────────────────────────────────────────
      - name: Build Tauri app and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # ── macOS code signing (uncomment when ready) ────────────────────
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # ── macOS notarization (uncomment when ready) ────────────────────
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ── Windows code signing (uncomment when ready) ──────────────────
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          # Upload to the pre-created release (tag push) or build-only (workflow_dispatch).
          # When releaseId is empty, tauri-action builds without uploading.
          releaseId: ${{ needs.create-release.outputs.release-id || '' }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}
          projectPath: '.'

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 3: Generate a single, complete updater manifest (latest.json).
  # This runs AFTER all build jobs finish, so it sees all platform artifacts.
  # Eliminates the race condition where parallel jobs each tried to upload
  # their own latest.json (causing "already_exists" failures in v0.2.4).
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  publish-updater:
    needs: build-tauri
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          WORK=$(mktemp -d)

          # Download all updater signature files from the release
          gh release download "$TAG" --repo "$REPO" --dir "$WORK" --pattern '*.sig'

          # Build platforms JSON by mapping each .sig file to Tauri platform identifiers
          PLATFORMS='{}'

          add_entry() {
            local key="$1" asset="$2" sig_path="$3"
            local sig
            sig=$(cat "$sig_path")
            PLATFORMS=$(jq -n --argjson p "$PLATFORMS" \
              --arg k "$key" --arg u "${BASE}/${asset}" --arg s "$sig" \
              '$p + {($k): {signature: $s, url: $u}}')
          }

          for sig_path in "$WORK"/*.sig; do
            [ -f "$sig_path" ] || continue
            sig_name=$(basename "$sig_path")
            asset="${sig_name%.sig}"

            case "$asset" in
              *.app.tar.gz)
                if [[ "$asset" == *_aarch64.* ]]; then
                  add_entry "darwin-aarch64"     "$asset" "$sig_path"
                  add_entry "darwin-aarch64-app" "$asset" "$sig_path"
                elif [[ "$asset" == *_x64.* ]]; then
                  add_entry "darwin-x86_64"     "$asset" "$sig_path"
                  add_entry "darwin-x86_64-app" "$asset" "$sig_path"
                fi ;;
              *.AppImage)
                if [[ "$asset" == *_amd64.* ]]; then
                  add_entry "linux-x86_64"          "$asset" "$sig_path"
                  add_entry "linux-x86_64-appimage" "$asset" "$sig_path"
                elif [[ "$asset" == *_aarch64.* ]]; then
                  add_entry "linux-aarch64"          "$asset" "$sig_path"
                  add_entry "linux-aarch64-appimage" "$asset" "$sig_path"
                fi ;;
              *.deb)
                if [[ "$asset" == *_amd64.* ]]; then
                  add_entry "linux-x86_64-deb" "$asset" "$sig_path"
                elif [[ "$asset" == *_arm64.* ]]; then
                  add_entry "linux-aarch64-deb" "$asset" "$sig_path"
                fi ;;
              *.rpm)
                if [[ "$asset" == *x86_64.* ]]; then
                  add_entry "linux-x86_64-rpm" "$asset" "$sig_path"
                elif [[ "$asset" == *aarch64.* ]]; then
                  add_entry "linux-aarch64-rpm" "$asset" "$sig_path"
                fi ;;
              *_en-US.msi)
                if [[ "$asset" == *_x64_* ]]; then
                  add_entry "windows-x86_64"     "$asset" "$sig_path"
                  add_entry "windows-x86_64-msi" "$asset" "$sig_path"
                elif [[ "$asset" == *_arm64_* ]]; then
                  add_entry "windows-aarch64"     "$asset" "$sig_path"
                  add_entry "windows-aarch64-msi" "$asset" "$sig_path"
                fi ;;
              *-setup.exe)
                if [[ "$asset" == *_x64-* ]]; then
                  add_entry "windows-x86_64-nsis" "$asset" "$sig_path"
                elif [[ "$asset" == *_arm64-* ]]; then
                  add_entry "windows-aarch64-nsis" "$asset" "$sig_path"
                fi ;;
            esac
          done

          # Generate the complete latest.json manifest
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          jq -n \
            --arg v "$VERSION" \
            --arg d "$PUB_DATE" \
            --argjson p "$PLATFORMS" \
            '{version: $v, notes: "", pub_date: $d, platforms: $p}' > latest.json

          PLATFORM_COUNT=$(jq '.platforms | keys | length' latest.json)
          echo "Generated latest.json with $PLATFORM_COUNT platform entries:"
          jq -r '.platforms | keys[]' latest.json

          # Delete existing latest.json if a build job uploaded one, then upload ours
          gh release delete-asset "$TAG" latest.json --repo "$REPO" --yes 2>/dev/null || true
          gh release upload "$TAG" latest.json --repo "$REPO"

          echo "✅ Published complete updater manifest"
          rm -rf "$WORK"
