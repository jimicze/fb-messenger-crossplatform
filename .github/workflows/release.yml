name: Release

on:
  push:
    tags:
      - 'v*.*.0'   # minor/major releases only (e.g. v1.2.0, v2.0.0)
                   # patch releases (v1.2.3) must be triggered via workflow_dispatch
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type (ignored when tag_override is set)'
        required: false
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      tag_override:
        description: 'Build & release an existing tag without bumping (e.g. v1.4.1). Leave empty for a normal bump.'
        required: false
        type: string
        default: ''


# ─────────────────────────────────────────────────────────────────────────────
# Seven-phase release:
#
#   0. bump-version    — (workflow_dispatch only) bump semver in source files,
#                        commit to main, push tag; no-op on tag-push trigger
#   1. create-release  — create a single GitHub Release (eliminates race)
#   2. build-tauri     — 6 parallel matrix jobs upload artifacts to that release
#   3. publish-updater — generate one complete latest.json after all builds
#   4. update-homebrew — patch Casks/messenger-x.rb in jimicze/homebrew-tap
#   5. update-winget   — submit updated manifest PR to microsoft/winget-pkgs
#
# Triggering a release:
#   • From GitHub UI / gh cli: Actions → Release → Run workflow → pick bump type
#   • From terminal (minor/major only): git tag vX.Y.0 && git push origin vX.Y.0
#   • Patch releases: use workflow_dispatch (patch tag push does NOT trigger CI)
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 0: Bump semver, commit, push tag.
  # Only runs on workflow_dispatch. On tag-push this job is a no-op (the
  # bump step is skipped) so downstream jobs always have a job to depend on.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new-tag:      ${{ steps.bump.outputs.new-tag || steps.override.outputs.new-tag }}
      is-backbuild: ${{ steps.override.outputs.is-backbuild }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Use tag_override (no bump)
        id: override
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag_override != ''
        run: |
          TAG="${{ github.event.inputs.tag_override }}"
          echo "tag_override mode: using existing tag ${TAG}"
          echo "new-tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "is-backbuild=true" >> "$GITHUB_OUTPUT"

      - name: Bump version, commit and push tag
        id: bump
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag_override == ''
        run: |
          set -euo pipefail

          # Ensure we are on the latest main before reading the current version.
          # Without this, a commit pushed between the workflow trigger and this
          # step causes "Updates were rejected (fetch first)" on git push.
          git fetch origin main
          git rebase origin/main

          BUMP="${{ github.event.inputs.bump_type }}"
          CURRENT=$(jq -r .version package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${NEW}"

          echo "Bumping ${CURRENT} → ${NEW} (${BUMP})"

          # ── Update version in all three version-carrying files ──────────────
          jq --arg v "$NEW" '.version = $v' package.json \
            > /tmp/package.json && mv /tmp/package.json package.json

          jq --arg v "$NEW" '.version = $v' src-tauri/tauri.conf.json \
            > /tmp/tauri.conf.json && mv /tmp/tauri.conf.json src-tauri/tauri.conf.json

          # Cargo.toml: replace `version = "X.Y.Z"` at start of line (under [package])
          sed -i "s/^version = \"[^\"]*\"/version = \"${NEW}\"/" src-tauri/Cargo.toml

          # ── Update Cargo.lock if it is tracked ────────────────────────────────
          if git ls-files --error-unmatch src-tauri/Cargo.lock 2>/dev/null; then
            sed -i '/^name = "messengerx"/{n;s/version = "[^"]*"/version = "'"${NEW}"'"/}' \
              src-tauri/Cargo.lock
            git add src-tauri/Cargo.lock
          fi

          # ── Commit and tag ────────────────────────────────────────────────────
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to ${TAG}"
          git tag "$TAG"

          git push origin HEAD:main
          git push origin "$TAG"

          echo "new-tag=${TAG}" >> "$GITHUB_OUTPUT"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 1: Create a single GitHub Release before any builds start.
  # Resolves the tag from either the bump-version output or the pushed tag.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  create-release:
    needs: bump-version
    if: |
      always() &&
      needs.bump-version.result != 'failure' &&
      (startsWith(github.ref, 'refs/tags/v') || needs.bump-version.outputs.new-tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-id:   ${{ steps.create.outputs.id }}
      tag-name:     ${{ steps.resolve-tag.outputs.name }}
      is-backbuild: ${{ needs.bump-version.outputs.is-backbuild }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0   # full history + all tags for git log

      - name: Resolve tag name
        id: resolve-tag
        run: |
          if [[ -n "${{ needs.bump-version.outputs.new-tag }}" ]]; then
            echo "name=${{ needs.bump-version.outputs.new-tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        id: notes
        run: |
          set -euo pipefail

          TAG="${{ steps.resolve-tag.outputs.name }}"

          # Ensure the tag itself is visible locally (needed for workflow_dispatch
          # path where bump-version just pushed it moments ago).
          git fetch --tags --quiet 2>/dev/null || true

          # Find the tag immediately BEFORE the current one (semver-sorted ascending).
          # Using ascending sort + awk avoids the backbuild problem: if we are
          # releasing an older tag (e.g. v1.4.1 after v1.4.3 exists), descending
          # sort would return the *newer* tag and produce an empty commit range.
          PREV_TAG=$(git tag --sort=version:refname \
            | awk -v tag="$TAG" 'prev && $0==tag{print prev; exit} {prev=$0}' \
            || true)
          echo "Range: ${PREV_TAG:-<beginning>}..${TAG}"

          # Collect commit subjects in the range (or all if first release).
          if [[ -n "${PREV_TAG}" ]]; then
            COMMITS=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"%s")
          else
            COMMITS=$(git log "${TAG}" --pretty=format:"%s")
          fi

          FEATURES=""
          FIXES=""
          OTHER=""

          # Store regex in variables — avoids bash [[ =~ ]] parser misreading
          # the ']' inside '[^)]' as the closing ']]' of the conditional.
          FEAT_RE='^feat(\([^)]*\))?!?:[[:space:]](.+)$'
          FIX_RE='^fix(\([^)]*\))?!?:[[:space:]](.+)$'

          while IFS= read -r msg; do
            [[ -z "$msg" ]] && continue
            # Skip CI-generated version bump commits.
            [[ "$msg" == "chore: bump version to"* ]] && continue

            if [[ "$msg" =~ $FEAT_RE ]]; then
              FEATURES+="- ${BASH_REMATCH[2]}"$'\n'
            elif [[ "$msg" =~ $FIX_RE ]]; then
              FIXES+="- ${BASH_REMATCH[2]}"$'\n'
            else
              OTHER+="- ${msg}"$'\n'
            fi
          done <<< "$COMMITS"

          # Build the changelog section.
          CHANGELOG=""
          [[ -n "$FEATURES" ]] && CHANGELOG+="### ✨ What's new"$'\n'"${FEATURES}"$'\n'
          [[ -n "$FIXES"    ]] && CHANGELOG+="### 🐛 Bug fixes"$'\n'"${FIXES}"$'\n'
          # Only show "Other changes" when there are no feat/fix commits at all.
          if [[ -z "$FEATURES" && -z "$FIXES" && -n "$OTHER" ]]; then
            CHANGELOG+="### Changes"$'\n'"${OTHER}"$'\n'
          fi

          # Assemble the full release body: changelog (if any) + downloads table.
          # If RELEASE_NOTES.md exists at the repo root it overrides the auto-
          # generated changelog section (used for milestone releases like v1.4.0
          # that consolidate many patch releases into a single curated summary).
          {
            if [[ -f "RELEASE_NOTES.md" ]]; then
              cat RELEASE_NOTES.md
              echo ""
            elif [[ -n "$CHANGELOG" ]]; then
              echo "$CHANGELOG"
            fi
            cat << 'DOWNLOADS'
          ## 📥 Downloads

          | Platform | Architecture | Installer |
          |----------|-------------|-----------|
          | **Windows** | x64 | `.exe` (NSIS) |
          | **Windows** | ARM64 | `.exe` (NSIS) |
          | **macOS** | Apple Silicon | `.dmg` |
          | **macOS** | Intel | `.dmg` |
          | **Linux** | x64 | `.deb` · `.AppImage` |
          | **Linux** | ARM64 | `.deb` · `.AppImage` |

          > Auto-update is supported — existing installs will be notified automatically.
          DOWNLOADS
          } > /tmp/release_body.md

          echo "Generated release body:"
          cat /tmp/release_body.md

      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.resolve-tag.outputs.name }}
          name: 'Messenger X ${{ steps.resolve-tag.outputs.name }}'
          body_path: /tmp/release_body.md
          draft: true
          prerelease: false

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 2: Build on all platforms and upload artifacts to the release.
  # Checks out the exact tag, syncs source versions to the tag name
  # (idempotent — handles both workflow_dispatch and manual tag push).
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-tauri:
    needs: [bump-version, create-release]
    if: always() && needs.create-release.result == 'success'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
            label: 'macOS-arm64'

          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
            label: 'macOS-x64'

          # ── Windows ────────────────────────────────────────────────────────
          - platform: 'windows-latest'
            args: ''
            rust-targets: ''
            label: 'Windows-x64'

          - platform: 'windows-latest'
            args: '--target aarch64-pc-windows-msvc'
            rust-targets: 'aarch64-pc-windows-msvc'
            label: 'Windows-arm64'

          # ── Linux x64 ─────────────────────────────────────────────────────
          - platform: 'ubuntu-22.04'
            args: ''
            rust-targets: ''
            label: 'Linux-x64'

          # ── Linux arm64 ───────────────────────────────────────────────────
          - platform: 'ubuntu-22.04-arm'
            args: ''
            rust-targets: ''
            label: 'Linux-arm64'

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Always build from the exact release tag (works for both trigger paths).
          ref: ${{ needs.create-release.outputs.tag-name }}

      # ── Linux system dependencies ────────────────────────────────────────
      - name: Install Linux system dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libssl-dev \
            libdbus-1-dev \
            xdg-utils \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good
          sudo apt-get install -y gstreamer1.0-pulseaudio || true

      # ── Node.js ──────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # ── Sync source versions to match release tag ────────────────────────
      # Ensures binaries always carry the correct version, even when the
      # release was triggered by a manual `git tag vX.Y.Z && git push`.
      # On workflow_dispatch the files already match, so this is idempotent.
      - name: Sync source versions to release tag
        shell: bash
        run: |
          TAG="${{ needs.create-release.outputs.tag-name }}"
          VERSION="${TAG#v}"
          echo "Ensuring source files match release version: ${VERSION}"
          node -e "
            const fs = require('fs');
            const v = '${VERSION}';

            // package.json
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');

            // tauri.conf.json
            const tc = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            tc.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tc, null, 2) + '\n');

            // Cargo.toml — replace first version = line (under [package])
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \"[^\"]*\"/m, 'version = \"' + v + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);

            console.log('All source versions set to ' + v);
          "

      # ── Rust toolchain ───────────────────────────────────────────────────
      - name: Install Rust stable toolchain (Linux/macOS)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust-targets }}

      - name: Install Rust stable toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          rustup toolchain install stable
          rustup default stable
          if ("${{ matrix.rust-targets }}" -ne "") {
            rustup target add ${{ matrix.rust-targets }}
          }
          rustc -V
          cargo -V

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.label }}

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── macOS: Configure code signing + notarization environment ─────────
      # Consolidates all Apple signing prep into one step so env vars are
      # only set when the corresponding secrets are actually present.
      #
      # - APPLE_SIGNING_IDENTITY is always exported (falls back to "-" for
      #   ad-hoc signing when the secret is absent).
      # - APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID are only written to
      #   GITHUB_ENV when ALL THREE are non-empty — passing any of them as
      #   an empty string causes Tauri's bundler to enter the notarization
      #   path and then fail its own Team ID length validation.
      # - The .p12 certificate is imported into a temporary keychain only
      #   when APPLE_CERTIFICATE is present.
      #
      # Required GitHub secrets (all optional until Apple Developer Program
      # is active):
      #   APPLE_CERTIFICATE          — base64-encoded Developer ID Application .p12
      #   APPLE_CERTIFICATE_PASSWORD — password for the .p12 file
      #   APPLE_SIGNING_IDENTITY     — "Developer ID Application: ..."
      #   APPLE_ID                   — Apple ID email for notarization
      #   APPLE_PASSWORD             — app-specific password for notarization
      #   APPLE_TEAM_ID              — 10-char team identifier
      - name: Configure macOS signing environment
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Always export signing identity — fall back to ad-hoc when secret absent
          echo "APPLE_SIGNING_IDENTITY=${APPLE_SIGNING_IDENTITY:--}" >> "$GITHUB_ENV"

          # Import developer certificate when secret is present
          if [[ -n "$APPLE_CERTIFICATE" ]]; then
            KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain
            security import certificate.p12 -k build.keychain \
              -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list \
              -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
            rm -f certificate.p12
            echo "Apple Developer Certificate imported into build.keychain"
          else
            echo "APPLE_CERTIFICATE not set — using ad-hoc signing (signingIdentity: -)"
          fi

          # Only export notarization vars when ALL THREE are present.
          # An empty APPLE_TEAM_ID causes Tauri bundler validation to fail.
          if [[ -n "$APPLE_ID" && -n "$APPLE_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            echo "APPLE_ID=$APPLE_ID"             >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"   >> "$GITHUB_ENV"
            echo "Notarization credentials configured"
          else
            echo "Notarization secrets not set — app will not be notarized"
          fi

      # ── Windows: Import Code Signing Certificate ──────────────────────────
      # No-op when WINDOWS_CERTIFICATE secret is not set (unsigned build).
      # Once an Authenticode OV/EV certificate (.pfx) is obtained (e.g. via
      # SignPath.io for OSS or a commercial CA), this step imports it and
      # exports the thumbprint for use in the config-patching step below.
      #
      # Required GitHub secrets:
      #   WINDOWS_CERTIFICATE          — base64-encoded .pfx certificate
      #   WINDOWS_CERTIFICATE_PASSWORD — password for the .pfx file
      - name: Import Windows Code Signing Certificate
        if: runner.os == 'Windows'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          if (-not $env:WINDOWS_CERTIFICATE) {
            Write-Host "WINDOWS_CERTIFICATE secret not set — Windows installer will be unsigned"
            exit 0
          }
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath  = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          $secPwd = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $cert   = Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $secPwd
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Remove-Item $certPath
          Write-Host "Certificate imported: $($cert.Subject) [$($cert.Thumbprint)]"

      # ── Windows: Inject certificate thumbprint into tauri.conf.json ───────
      # Only runs when the previous step exported a thumbprint.
      # Tauri's bundler reads certificateThumbprint from config to call signtool.
      - name: Set Windows certificate thumbprint
        if: runner.os == 'Windows' && env.WINDOWS_CERTIFICATE_THUMBPRINT != ''
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const tc = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            tc.bundle.windows.certificateThumbprint = process.env.WINDOWS_CERTIFICATE_THUMBPRINT;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tc, null, 2) + '\n');
            console.log('Windows certificate thumbprint set to:', process.env.WINDOWS_CERTIFICATE_THUMBPRINT);
          "

      # ── Build & Upload ───────────────────────────────────────────────────
      - name: Build Tauri app and upload release assets
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Apple signing / notarization vars are set by the "Configure macOS
          # signing environment" step above via GITHUB_ENV, so they are
          # available as process environment variables here without being
          # explicitly listed.  Listing them here (even as empty strings) would
          # override the GITHUB_ENV values and cause Tauri's notarization path
          # to receive empty strings, which fails Team ID validation.
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          tagName:   ${{ needs.create-release.outputs.tag-name }}
          includeUpdaterJson: false
          args: ${{ matrix.args }}
          projectPath: '.'

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 3: Generate a single, complete updater manifest (latest.json).
  # Runs after all build jobs so it sees every platform's .sig file.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  publish-updater:
    needs: [create-release, build-tauri]
    if: always() && needs.build-tauri.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ needs.create-release.outputs.tag-name }}"
          VERSION="${TAG#v}"
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          WORK=$(mktemp -d)

          # Download all updater signature files from the release
          gh release download "$TAG" --repo "$REPO" --dir "$WORK" --pattern '*.sig'

          # Build platforms JSON by mapping each .sig file to Tauri platform identifiers
          PLATFORMS='{}'

          add_entry() {
            local key="$1" asset="$2" sig_path="$3"
            local sig
            sig=$(cat "$sig_path")
            PLATFORMS=$(jq -n --argjson p "$PLATFORMS" \
              --arg k "$key" --arg u "${BASE}/${asset}" --arg s "$sig" \
              '$p + {($k): {signature: $s, url: $u}}')
          }

          for sig_path in "$WORK"/*.sig; do
            [ -f "$sig_path" ] || continue
            sig_name=$(basename "$sig_path")
            asset="${sig_name%.sig}"

            case "$asset" in
              *.app.tar.gz)
                if [[ "$asset" == *_aarch64.* ]]; then
                  add_entry "darwin-aarch64"     "$asset" "$sig_path"
                  add_entry "darwin-aarch64-app" "$asset" "$sig_path"
                elif [[ "$asset" == *_x64.* ]]; then
                  add_entry "darwin-x86_64"     "$asset" "$sig_path"
                  add_entry "darwin-x86_64-app" "$asset" "$sig_path"
                fi ;;
              *.AppImage)
                if [[ "$asset" == *_amd64.* ]]; then
                  add_entry "linux-x86_64"          "$asset" "$sig_path"
                  add_entry "linux-x86_64-appimage" "$asset" "$sig_path"
                elif [[ "$asset" == *_aarch64.* ]]; then
                  add_entry "linux-aarch64"          "$asset" "$sig_path"
                  add_entry "linux-aarch64-appimage" "$asset" "$sig_path"
                fi ;;
              *-setup.exe)
                if [[ "$asset" == *_x64-* ]]; then
                  add_entry "windows-x86_64"      "$asset" "$sig_path"
                  add_entry "windows-x86_64-nsis" "$asset" "$sig_path"
                elif [[ "$asset" == *_arm64-* ]]; then
                  add_entry "windows-aarch64"      "$asset" "$sig_path"
                  add_entry "windows-aarch64-nsis" "$asset" "$sig_path"
                fi ;;
            esac
          done

          # Generate the complete latest.json manifest
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          jq -n \
            --arg v "$VERSION" \
            --arg d "$PUB_DATE" \
            --argjson p "$PLATFORMS" \
            '{version: $v, notes: "", pub_date: $d, platforms: $p}' > latest.json

          PLATFORM_COUNT=$(jq '.platforms | keys | length' latest.json)
          echo "Generated latest.json with $PLATFORM_COUNT platform entries:"
          jq -r '.platforms | keys[]' latest.json

          # Delete existing latest.json (if a build job uploaded one) then upload ours
          gh release delete-asset "$TAG" latest.json --repo "$REPO" --yes 2>/dev/null || true
          gh release upload "$TAG" latest.json --repo "$REPO"

          # Publish the release. For backbuilds (tag_override) we do NOT mark it
          # as Latest — the real latest release must stay unchanged.
          if [[ "${{ needs.create-release.outputs.is-backbuild }}" == "true" ]]; then
            gh release edit "$TAG" --repo "$REPO" --draft=false
            echo "Backbuild: release published WITHOUT --latest (${TAG} is older than current latest)"
          else
            gh release edit "$TAG" --repo "$REPO" --draft=false --latest
          fi

          echo "Done: published complete updater manifest for ${TAG}"
          rm -rf "$WORK"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 4: Update Homebrew tap (jimicze/homebrew-tap).
  # Updates Casks/messenger-x.rb with the new version + SHA256 hashes.
  # Requires: HOMEBREW_TAP_PAT secret (fine-grained PAT, write to homebrew-tap)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  update-homebrew:
    needs: [create-release, publish-updater]
    if: always() && needs.publish-updater.result == 'success' && needs.create-release.outputs.is-backbuild != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Update Homebrew Cask
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
        run: |
          set -euo pipefail

          if [[ -z "${HOMEBREW_TAP_PAT}" ]]; then
            echo "HOMEBREW_TAP_PAT secret not set — skipping Homebrew tap update"
            exit 0
          fi

          TAG="${{ needs.create-release.outputs.tag-name }}"
          VERSION="${TAG#v}"

          # Fetch SHA256 hashes from the GitHub release assets
          ARM_SHA=$(gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" --json assets \
            -q ".assets[] | select(.name == \"Messenger.X_${VERSION}_aarch64.dmg\") | .digest" \
            | sed 's/^sha256://')
          X64_SHA=$(gh release view "$TAG" \
            --repo "$GITHUB_REPOSITORY" --json assets \
            -q ".assets[] | select(.name == \"Messenger.X_${VERSION}_x64.dmg\") | .digest" \
            | sed 's/^sha256://')

          echo "ARM sha256: ${ARM_SHA}"
          echo "x64 sha256: ${X64_SHA}"

          # Clone tap, patch formula, push
          git clone "https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/jimicze/homebrew-tap.git"
          cd homebrew-tap

          sed -i "s/version \"[^\"]*\"/version \"${VERSION}\"/" Casks/messenger-x.rb
          sed -i "s/arm:   \"[^\"]*\"/arm:   \"${ARM_SHA}\"/"  Casks/messenger-x.rb
          sed -i "s/intel: \"[^\"]*\"/intel: \"${X64_SHA}\"/"  Casks/messenger-x.rb

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/messenger-x.rb
          git diff --cached --quiet && echo "No changes (version already up to date)" && exit 0
          git commit -m "chore: bump messenger-x to ${VERSION}"
          git push
          echo "Homebrew tap updated to ${VERSION}"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 5: Submit updated winget manifest to microsoft/winget-pkgs.
  # Uses wingetcreate to auto-compute SHA256 and open a PR.
  # Requires: WINGET_PAT secret (classic PAT with public_repo scope)
  # Note: only works after the initial package is accepted into the registry.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  update-winget:
    needs: [create-release, publish-updater]
    if: always() && needs.publish-updater.result == 'success' && needs.create-release.outputs.is-backbuild != 'true'
    runs-on: windows-latest

    steps:
      - name: Submit winget manifest update
        env:
          WINGET_PAT: ${{ secrets.WINGET_PAT }}
        shell: pwsh
        run: |
          if (-not $env:WINGET_PAT) {
            Write-Host "WINGET_PAT secret not set — skipping winget manifest update"
            exit 0
          }

          $TAG     = "${{ needs.create-release.outputs.tag-name }}"
          $VERSION = $TAG.TrimStart('v')
          $BASE    = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$TAG"

          # Check whether the package already exists in the winget-pkgs registry.
          # Until the initial PR (submitted manually for v1.3.1) is merged, the
          # package folder does not exist and wingetcreate update would exit 1.
          $pkgApi = "https://api.github.com/repos/microsoft/winget-pkgs/contents/manifests/j/jimicze/MessengerX"
          try {
            $null = Invoke-RestMethod -Uri $pkgApi `
              -Headers @{ Authorization = "Bearer $env:WINGET_PAT"; "User-Agent" = "github-actions" } `
              -ErrorAction Stop
          } catch {
            Write-Host "Package jimicze.MessengerX not yet in winget registry (initial PR pending merge) — skipping update"
            exit 0
          }

          # Sync the fork (jimicze/winget-pkgs) with upstream (microsoft/winget-pkgs)
          # before calling wingetcreate — otherwise wingetcreate fails with
          # "The forked repository could not be synced with the upstream commits."
          try {
            $syncResult = Invoke-RestMethod -Method POST `
              -Uri "https://api.github.com/repos/jimicze/winget-pkgs/merge-upstream" `
              -Headers @{ Authorization = "Bearer $env:WINGET_PAT"; "User-Agent" = "github-actions" } `
              -Body '{"branch":"master"}' `
              -ContentType "application/json" `
              -ErrorAction Stop
            Write-Host "Fork synced: $($syncResult.merge_type) — $($syncResult.message)"
          } catch {
            Write-Host "Fork sync warning (non-fatal): $_"
          }

          # Download wingetcreate
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" `
            -OutFile wingetcreate.exe -UseBasicParsing

          # wingetcreate update auto-downloads installers, computes SHA256, and opens a PR
          .\wingetcreate.exe update jimicze.MessengerX `
            --version $VERSION `
            --urls "$BASE/Messenger.X_${VERSION}_x64-setup.exe" `
                   "$BASE/Messenger.X_${VERSION}_arm64-setup.exe" `
            --token $env:WINGET_PAT `
            --submit

          Write-Host "winget manifest submitted for ${VERSION}"

