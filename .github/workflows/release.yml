name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Matrix produces 7 artifacts:
#   macOS      — arm64 (.dmg) + x86_64 (.dmg)
#   Windows    — x64 (.exe/.msi) + arm64 (.exe/.msi)
#   Linux x64  — .deb + .rpm + .AppImage
#   Linux arm64— .deb + .rpm + .AppImage
#
# Distro coverage:
#   Debian / Ubuntu / Linux Mint → .deb
#   Fedora / RHEL / openSUSE     → .rpm
#   Arch / NixOS / any distro    → .AppImage (universal)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
            label: 'macOS-arm64'

          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
            label: 'macOS-x64'

          # ── Windows ────────────────────────────────────────────────────────
          - platform: 'windows-latest'
            args: ''
            rust-targets: ''
            label: 'Windows-x64'

          - platform: 'windows-latest'
            args: '--target aarch64-pc-windows-msvc'
            rust-targets: 'aarch64-pc-windows-msvc'
            label: 'Windows-arm64'

          # ── Linux x64 ─────────────────────────────────────────────────────
          - platform: 'ubuntu-22.04'
            args: ''
            rust-targets: ''
            label: 'Linux-x64'

          # ── Linux arm64 ────────────────────────────────────────────────────
          # Uses native GitHub ARM runner (ubuntu-22.04-arm).
          # If unavailable on your plan, swap to self-hosted ARM runner or
          # remove this entry — the x64 .AppImage covers most users.
          - platform: 'ubuntu-22.04-arm'
            args: ''
            rust-targets: ''
            label: 'Linux-arm64'

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── Linux system dependencies ────────────────────────────────────────
      - name: Install Linux system dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libssl-dev \
            libdbus-1-dev \
            xdg-utils

      # ── Node.js ──────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # ── Rust toolchain ───────────────────────────────────────────────────
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          # Separate caches per target to avoid collisions.
          key: ${{ matrix.label }}

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── Build & Release ──────────────────────────────────────────────────
      - name: Build Tauri app and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # ── macOS code signing (uncomment when ready) ────────────────────
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # ── macOS notarization (uncomment when ready) ────────────────────
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ── Windows code signing (uncomment when ready) ──────────────────
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Messenger X v__VERSION__'
          releaseBody: |
            ## Downloads

            | Platform | Architecture | Installer |
            |----------|-------------|-----------|
            | **Windows** | x64 | `.exe` (NSIS) or `.msi` |
            | **Windows** | ARM64 | `.exe` (NSIS) or `.msi` |
            | **macOS** | Apple Silicon | `.dmg` |
            | **macOS** | Intel | `.dmg` |
            | **Linux** | x64 | `.deb` / `.rpm` / `.AppImage` |
            | **Linux** | ARM64 | `.deb` / `.rpm` / `.AppImage` |

            ### Linux distro guide
            - **Debian / Ubuntu / Linux Mint** → `.deb`
            - **Fedora / RHEL / openSUSE** → `.rpm`
            - **Arch Linux / any other** → `.AppImage`
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
          projectPath: '.'
