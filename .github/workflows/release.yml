name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ─────────────────────────────────────────────────────────────────────────────
# Two-phase release:
#   1. create-release  — creates a single GitHub Release (eliminates race)
#   2. build-tauri     — 6 parallel matrix jobs upload artifacts to that release
#
# Matrix produces artifacts for:
#   macOS      — arm64 (.dmg) + x86_64 (.dmg)
#   Windows    — x64 (.exe/.msi) + arm64 (.exe/.msi)
#   Linux x64  — .deb + .rpm + .AppImage
#   Linux arm64— .deb + .rpm + .AppImage
#
# Distro coverage:
#   Debian / Ubuntu / Linux Mint → .deb
#   Fedora / RHEL / openSUSE     → .rpm
#   Arch / NixOS / any distro    → .AppImage (universal)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 1: Create a single GitHub Release before any builds start.
  # This eliminates the race condition where parallel matrix jobs each tried
  # to create their own draft release (causing lost artifacts in v0.2.1).
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-id: ${{ steps.create.outputs.id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Messenger X ${{ github.ref_name }}'
          body: |
            ## Downloads

            | Platform | Architecture | Installer |
            |----------|-------------|-----------|
            | **Windows** | x64 | `.exe` (NSIS) or `.msi` |
            | **Windows** | ARM64 | `.exe` (NSIS) or `.msi` |
            | **macOS** | Apple Silicon | `.dmg` |
            | **macOS** | Intel | `.dmg` |
            | **Linux** | x64 | `.deb` / `.rpm` / `.AppImage` |
            | **Linux** | ARM64 | `.deb` / `.rpm` / `.AppImage` |

            ### Linux distro guide
            - **Debian / Ubuntu / Linux Mint** → `.deb`
            - **Fedora / RHEL / openSUSE** → `.rpm`
            - **Arch Linux / any other** → `.AppImage`
          draft: false
          prerelease: false

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Phase 2: Build on all platforms and upload artifacts to the release.
  # Each job receives the releaseId so no job tries to create its own release.
  # For workflow_dispatch (no tag), jobs only build without uploading.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build-tauri:
    needs: create-release
    if: always()
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
            label: 'macOS-arm64'

          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
            label: 'macOS-x64'

          # ── Windows ────────────────────────────────────────────────────────
          - platform: 'windows-latest'
            args: ''
            rust-targets: ''
            label: 'Windows-x64'

          - platform: 'windows-latest'
            args: '--target aarch64-pc-windows-msvc'
            rust-targets: 'aarch64-pc-windows-msvc'
            label: 'Windows-arm64'

          # ── Linux x64 ─────────────────────────────────────────────────────
          - platform: 'ubuntu-22.04'
            args: ''
            rust-targets: ''
            label: 'Linux-x64'

          # ── Linux arm64 ────────────────────────────────────────────────────
          - platform: 'ubuntu-22.04-arm'
            args: ''
            rust-targets: ''
            label: 'Linux-arm64'

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── Linux system dependencies ────────────────────────────────────────
      - name: Install Linux system dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libssl-dev \
            libdbus-1-dev \
            xdg-utils

      # ── Node.js ──────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # ── Rust toolchain ───────────────────────────────────────────────────
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.label }}

      # ── Frontend ─────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── Build & Upload ───────────────────────────────────────────────────
      - name: Build Tauri app and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # ── macOS code signing (uncomment when ready) ────────────────────
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # ── macOS notarization (uncomment when ready) ────────────────────
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ── Windows code signing (uncomment when ready) ──────────────────
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          # Upload to the pre-created release (tag push) or build-only (workflow_dispatch).
          # When releaseId is empty, tauri-action builds without uploading.
          releaseId: ${{ needs.create-release.outputs.release-id || '' }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          includeUpdaterJson: ${{ startsWith(github.ref, 'refs/tags/v') }}
          args: ${{ matrix.args }}
          projectPath: '.'
