name: Test Build

# Builds the app from any branch and uploads artifacts for manual testing.
# Does NOT bump the version, commit, push tags, or create a GitHub Release.
# Intended for validating PR branches before merging.
#
# Trigger: Actions → Test Build → Run workflow → pick branch
# Artifacts: Actions → run → Artifacts section (requires GitHub login to download)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.label }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x64 ─────────────────────────────────────────────────────
          - platform: 'ubuntu-22.04'
            args: ''
            rust-targets: ''
            label: 'Linux-x64'

          # ── Linux arm64 ───────────────────────────────────────────────────
          - platform: 'ubuntu-22.04-arm'
            args: ''
            rust-targets: ''
            label: 'Linux-arm64'

          # ── macOS Apple Silicon ───────────────────────────────────────────
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
            label: 'macOS-arm64'

          # ── macOS Intel ───────────────────────────────────────────────────
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
            label: 'macOS-x64'

          # ── Windows x64 ───────────────────────────────────────────────────
          - platform: 'windows-latest'
            args: ''
            rust-targets: ''
            label: 'Windows-x64'

          # ── Windows arm64 ─────────────────────────────────────────────────
          - platform: 'windows-latest'
            args: '--target aarch64-pc-windows-msvc'
            rust-targets: 'aarch64-pc-windows-msvc'
            label: 'Windows-arm64'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-tags: true

      - name: Install Linux system dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libglib2.0-dev \
            libssl-dev \
            libdbus-1-dev \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      # Patch version files to match the latest release tag so debug
      # artifacts carry a meaningful version instead of the stale value
      # committed in the source tree.  Mirrors the "Sync source versions
      # to release tag" step in release.yml (idempotent; safe to re-run).
      - name: Sync source versions to latest release tag
        shell: bash
        run: |
          git fetch --tags --quiet 2>/dev/null || true
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          BASE_VERSION="${LATEST_TAG#v}"
          # Append sanitized branch name as a semver pre-release identifier so
          # test artifacts are immediately distinguishable from production builds
          # (e.g. 1.5.2-fix-release-warnings, 1.5.2-main).
          SAFE_BRANCH=$(echo "${GITHUB_REF_NAME}" \
            | sed 's/[^a-zA-Z0-9]/-/g' \
            | sed 's/-\+/-/g'          \
            | sed 's/^-//;s/-$//')
          VERSION="${BASE_VERSION}-${SAFE_BRANCH}"
          echo "Test build version: ${VERSION}  (base: ${BASE_VERSION}, branch: ${GITHUB_REF_NAME})"
          node -e "
            const fs = require('fs');
            const v = '${VERSION}';

            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');

            const tc = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            tc.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tc, null, 2) + '\n');

            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \"[^\"]*\"/m, 'version = \"' + v + '\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);

            console.log('All source versions set to ' + v);
          "

      - name: Install Rust stable toolchain (Linux / macOS)
        if: runner.os != 'Windows'
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust-targets }}

      - name: Install Rust stable toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          rustup toolchain install stable
          rustup default stable
          if ("${{ matrix.rust-targets }}" -ne "") {
            rustup target add ${{ matrix.rust-targets }}
          }
          rustc -V
          cargo -V

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: './src-tauri -> target'
          key: test-${{ matrix.label }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (debug)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npm run tauri build -- --debug ${{ matrix.args }}

      # ── Upload Linux artifacts (.deb + .AppImage) ─────────────────────────
      - name: Upload Linux artifacts
        if: contains(matrix.platform, 'ubuntu')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.label }}-debug
          retention-days: 7
          if-no-files-found: error
          path: |
            src-tauri/target/**/debug/bundle/deb/*.deb
            src-tauri/target/**/debug/bundle/appimage/*.AppImage

      # ── Upload macOS artifacts (.dmg) ─────────────────────────────────────
      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.label }}-debug
          retention-days: 7
          if-no-files-found: error
          path: |
            src-tauri/target/**/debug/bundle/dmg/*.dmg

      # ── Upload Windows artifacts (.exe NSIS installer) ────────────────────
      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.label }}-debug
          retention-days: 7
          if-no-files-found: error
          path: |
            src-tauri/target/**/debug/bundle/nsis/*.exe
